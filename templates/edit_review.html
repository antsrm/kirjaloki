{% extends "layout.html" %}

{% block content %}

<h2>Muokkaa kirja-arviota</h2>

<form action="/edit_review/{{ review.id }}" method="post">
    <p>
        Kirjan nimi:<br>
        <input type="text" name="title" value="{{ review.title }}">
    </p>

    <p>
        Kirjailija:<br>
        <input type="text" name="author" value="{{ review.author }}">
    </p>

    <p>
        Arvosana:<br>
        <input type="number" name="rating" min="1" max="5" value="{{ review.rating }}">
    </p>

    <p>
        Arvio:<br>
        <textarea name="review" rows="5" cols="40">{{ review.review }}</textarea>
    </p>

    <input type="submit" value="Tallenna muutokset">
</form>

{% endblock %}
