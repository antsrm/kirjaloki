{% extends "layout.html" %}

{% block content %}

<h2>Kirjaudu sisään</h2>

<form action="/login" method="post">

    <input type="hidden"
           name="csrf_token"
           value="{{ session.csrf_token }}">

    <p>
        Käyttäjätunnus:<br>
        <input type="text" name="username">
    </p>

    <p>
        Salasana:<br>
        <input type="password" name="password">
    </p>

    <input type="submit" value="Kirjaudu">
</form>

{% endblock %}
